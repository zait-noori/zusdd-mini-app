<svg width="1200" height="628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#ffd700" opacity="0.1"/>
  <circle cx="1100" cy="528" r="120" fill="#ffd700" opacity="0.1"/>
  <circle cx="600" cy="314" r="150" fill="#ffd700" opacity="0.05"/>
  
  <!-- Main title -->
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffd700" text-anchor="middle">
    ZUSDD Mini App
  </text>
  
  <!-- Subtitle with emoji -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle">
    💎 Telegram Trading Platform
  </text>
  
  <!-- Diamond icon -->
  <g transform="translate(600, 280)">
    <!-- Diamond shape -->
    <path d="M 0 -60 L 50 0 L 0 60 L -50 0 Z" fill="url(#goldGradient)" stroke="#ffed4e" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Features list -->
  <g font-family="Arial, sans-serif" font-size="28" fill="#ffffff">
    <text x="150" y="400">📈 Live Trading</text>
    <text x="150" y="460">💰 Real-time Balance</text>
    <text x="150" y="520">🏆 Referral Rewards</text>
    
    <text x="650" y="400">🔄 Quick Transfers</text>
    <text x="650" y="460">📊 Market Data</text>
    <text x="650" y="520">🎯 For Afghan Community</text>
  </g>
  
  <!-- CTA Button style -->
  <rect x="350" y="570" width="500" height="50" rx="10" fill="#ffd700" opacity="0.9"/>
  <text x="600" y="605" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f0c29" text-anchor="middle">
    Tap to Open Mini App
  </text>
</svg>