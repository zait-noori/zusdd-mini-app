<!DOCTYPE html>
<html>
<head>

    <style>
        * {
            margin: 0;

            justify-content: center;
            align-items: center;
            color: white;

            text-align: center;

            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 span {
            color: #ffd700;
        }

        .price {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .price small {
            font-size: 16px;
            color: #ccc;
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 30px;
            cursor: pointer;
            color: #1a1a2e;
            transition: transform 0.2s;
        }

        button:hover {

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="token-icon">
            💎
        </div>
        <h1>ZUSDD <span>$</span></h1>
        <div class="price">
            $0.024 <small>USD</small>
        </div>
        <p>د تلګرام کریپټو ټوکن</p>
        <button onclick="window.Telegram.WebApp.close()">تړل</button>
        <div class="info">
            ⚡ په زیاتیدو کې | د ZUSDD ټولنه
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.setText("راځئ سودا وکړو");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.close();
        });
    </script>
</body>
